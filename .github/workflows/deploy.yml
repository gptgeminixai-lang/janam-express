name: Deploy Janam Express to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'janam-express/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let a new push cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: janam-express/package-lock.json
      - run: npm ci
        working-directory: janam-express
      - run: npm run build
        working-directory: janam-express
        env:
          PUBLIC_BASE: /
      - uses: actions/upload-pages-artifact@v3
        with:
          path: janam-express/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
